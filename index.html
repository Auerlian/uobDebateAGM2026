<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UoB Debate Society - Live Election System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; 
        }
        .icon {
            width: 1em;
            height: 1em;
            display: inline-block;
            vertical-align: middle;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
        .animate-ping {
            animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Simple icon components using SVG
        function createIcon(paths, className = '') {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('class', className + ' icon');
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.setAttribute('fill', 'none');
            svg.setAttribute('stroke', 'currentColor');
            svg.setAttribute('stroke-width', '2');
            
            paths.forEach(pathData => {
                const path = document.createElementNS('http://www.w3.org/2000/svg', pathData.type || 'path');
                Object.keys(pathData).forEach(attr => {
                    if (attr !== 'type') {
                        path.setAttribute(attr, pathData[attr]);
                    }
                });
                svg.appendChild(path);
            });
            
            return svg;
        }

        const icons = {

            checkCircle: [
                { d: 'M22 11.08V12a10 10 0 1 1-5.93-9.14' },
                { type: 'polyline', points: '22,4 12,14.01 9,11.01' }
            ],
            user: [
                { d: 'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2' },

            ],
            lock: [
                { type: 'rect', x: '3', y: '11', width: '18', height: '11', rx: '2', ry: '2' },

                { d: 'M7 11V7a5 5 0 0 1 10 0v4' }
            ],

                { type: 'circle', cx: '12', cy: '12', r: '10' },
                { type: 'polyline', points: '12,6 12,12 16,14' }
            ],
            play: [{ type: 'polygon', points: '5,3 19,12 5,21' }],
            square: [{ type: 'rect', x: '3', y: '3', width: '18', height: '18', rx: '2', ry: '2' }],
            eye: [
                { d: 'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z' },
                { type: 'circle', cx: '12', cy: '12', r: '3' }
            ],
            trophy: [
                { type: 'line', x1: '8', y1: '21', x2: '16', y2: '21' },
                { type: 'line', x1: '12', y1: '17', x2: '12', y2: '21' },
                { d: 'M7 4V2a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v2' },
                { d: 'M7 4h10l2 6H5l2-6z' }
            ],
            barChart: [
                { type: 'line', x1: '12', y1: '20', x2: '12', y2: '10' },
                { type: 'line', x1: '18', y1: '20', x2: '18', y2: '4' },
                { type: 'line', x1: '6', y1: '20', x2: '6', y2: '16' }
            ]
        };

        // Application State
        let appState = {
            view: 'login', // 'login', 'voter', 'admin'
            currentUser: null,
            candidates: [
                { fullName: "Alice Smith", studentId: "1000001", attending: "In-person", roles: ["President"] },
                { fullName: "Bob Jones", studentId: "1000002", attending: "Online", roles: ["President", "Vice President"] },
                { fullName: "Charlie Brown", studentId: "1000003", attending: "In-person", roles: ["Vice President"] },
                { fullName: "Diana Prince", studentId: "1000004", attending: "In-person", roles: ["Secretary"] },
                { fullName: "Emma Watson", studentId: "1000005", attending: "In-person", roles: ["Secretary", "Treasurer"] },
                { fullName: "Frank Miller", studentId: "1000006", attending: "Online", roles: ["Treasurer"] },
                { fullName: "Grace Lee", studentId: "1000007", attending: "In-person", roles: ["Public Debate Training Officer"] },
                { fullName: "Henry Ford", studentId: "1000008", attending: "In-person", roles: ["Public Debate Training Officer", "British Parliamentary Training Officer"] },
                { fullName: "Ivy Chen", studentId: "1000009", attending: "Online", roles: ["British Parliamentary Training Officer"] },
                { fullName: "Jack Wilson", studentId: "1000010", attending: "In-person", roles: ["Tournament Secretary"] },
                { fullName: "Kate Johnson", studentId: "1000011", attending: "In-person", roles: ["Tournament Secretary", "Social Secretary"] },
                { fullName: "Liam Davis", studentId: "1000012", attending: "Online", roles: ["Social Secretary"] },
                { fullName: "Maya Patel", studentId: "1000013", attending: "In-person", roles: ["Equity Officer"] },
                { fullName: "Noah Kim", studentId: "1000014", attending: "In-person", roles: ["Equity Officer"] }
            ],
            votersDB: {
                "1234567": { code: "UOB2024A", votedPositions: [] },
                "7654321": { code: "UOB2024B", votedPositions: [] },
                "2345678": { code: "UOB2024C", votedPositions: [] },
                "3456789": { code: "UOB2024D", votedPositions: [] },
                "4567890": { code: "UOB2024E", votedPositions: [] }
            },
            results: {},
            election: {
                activePosition: null,
                status: 'idle', // 'idle', 'open', 'closed'
                revealedPositions: []
            }
        };

        const POSITIONS = [
            "President", "Vice President", "Secretary", "Treasurer", 
            "Public Debate Training Officer", "British Parliamentary Training Officer", 
            "Tournament Secretary", "Social Secretary", "Equity Officer"
        ];

        // Helper functions
        function createElement(tag, className = '', content = '') {
            const el = document.createElement(tag);
            if (className) el.className = className;
            if (content) el.textContent = content;
            return el;
        }

        function createButton(text, className, onClick) {
            const btn = createElement('button', className, text);
            btn.addEventListener('click', onClick);
            return btn;
        }

        function createInput(type, placeholder, className, value = '') {
            const input = document.createElement('input');
            input.type = type;
            input.placeholder = placeholder;
            input.className = className;
            input.value = value;
            return input;
        }

        // Login handlers
        function handleLogin(studentId, code, isAdmin) {
            if (isAdmin) {
                if (studentId === "admin" && code === "admin") {
                    appState.currentUser = { id: 'admin', role: 'admin' };
                    appState.view = 'admin';
                    render();
                    return { success: true };
                }
                return { success: false, message: "Invalid Admin Credentials" };
            }

            const voter = appState.votersDB[studentId];
            if (!voter) return { success: false, message: "Student ID not found." };
            if (voter.code !== code) return { success: false, message: "Invalid voting code." };

            appState.currentUser = { id: studentId, role: 'voter' };
            appState.view = 'voter';
            render();
            return { success: true };
        }

        function handleCastVote(position, candidateName) {
            // Record vote
            if (!appState.results[position]) {
                appState.results[position] = { "Re-Open Nominations (RON)": 0, "Abstain": 0 };
            }
            appState.results[position][candidateName] = (appState.results[position][candidateName] || 0) + 1;

            // Mark voter as voted
            appState.votersDB[appState.currentUser.id].votedPositions.push(position);
            render();
        }

        function handleLogout() {
            appState.currentUser = null;
            appState.view = 'login';
            render();
        }

        // Admin handlers
        function handleOpenVoting(position) {
            appState.election.activePosition = position;
            appState.election.status = 'open';
            render();
        }

        function handleCloseVoting() {
            appState.election.status = 'closed';
            render();
        }

        function handleRevealResults() {
            if (!appState.election.revealedPositions.includes(appState.election.activePosition)) {
                appState.election.revealedPositions.push(appState.election.activePosition);
            }
            appState.election.status = 'idle';
            render();
        }

        // Render functions
        function renderLoginView() {
            const container = createElement('div', 'max-w-md mx-auto w-full mt-10');
            
            const card = createElement('div', 'bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden');
            
            // Tabs
            const tabs = createElement('div', 'flex border-b border-slate-200 bg-slate-50');
            let isAdminTab = false;
            
            const voterTab = createButton('Voter Login', 'flex-1 py-4 text-sm font-bold transition-colors text-blue-600 border-b-2 border-blue-600 bg-white', () => {
                isAdminTab = false;
                updateTabs();
            });
            
            const adminTab = createButton('Admin Login', 'flex-1 py-4 text-sm font-bold transition-colors text-slate-500 hover:bg-slate-100', () => {
                isAdminTab = true;
                updateTabs();
            });
            
            function updateTabs() {
                voterTab.className = `flex-1 py-4 text-sm font-bold transition-colors ${!isAdminTab ? 'text-blue-600 border-b-2 border-blue-600 bg-white' : 'text-slate-500 hover:bg-slate-100'}`;
                adminTab.className = `flex-1 py-4 text-sm font-bold transition-colors ${isAdminTab ? 'text-blue-600 border-b-2 border-blue-600 bg-white' : 'text-slate-500 hover:bg-slate-100'}`;
                titleEl.textContent = isAdminTab ? 'Returning Officer Portal' : 'Committee Elections';
                subtitleEl.textContent = isAdminTab ? 'Manage the live election flow' : 'Sign in to access the live voting session';
                studentIdInput.placeholder = isAdminTab ? "admin" : "e.g. 1234567";
                codeInput.type = isAdminTab ? "password" : "text";
                codeInput.placeholder = isAdminTab ? "••••••••" : "Enter 8-character code";
                submitBtn.textContent = isAdminTab ? 'Access Dashboard' : 'Join Live Session';
                errorEl.textContent = '';
            }
            
            tabs.appendChild(voterTab);
            tabs.appendChild(adminTab);
            
            // Form content
            const formContainer = createElement('div', 'p-8');
            
            const header = createElement('div', 'text-center mb-6');
            const titleEl = createElement('h2', 'text-2xl font-bold text-slate-800', 'Committee Elections');
            const subtitleEl = createElement('p', 'text-slate-500 text-sm mt-1', 'Sign in to access the live voting session');
            header.appendChild(titleEl);
            header.appendChild(subtitleEl);
            
            const form = createElement('form', 'space-y-5');
            
            const errorEl = createElement('div', 'hidden bg-red-50 text-red-700 p-3 rounded-lg text-sm border border-red-100');
            
            // Student ID field
            const idField = createElement('div', 'space-y-1');
            const idLabel = createElement('label', 'text-sm font-semibold text-slate-700 flex items-center gap-2');
            idLabel.appendChild(createIcon(icons.user, 'w-4 h-4'));
            idLabel.appendChild(document.createTextNode('Student ID'));
            const studentIdInput = createInput('text', 'e.g. 1234567', 'w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all');
            studentIdInput.required = true;
            idField.appendChild(idLabel);
            idField.appendChild(studentIdInput);
            
            // Code field
            const codeField = createElement('div', 'space-y-1');
            const codeLabel = createElement('label', 'text-sm font-semibold text-slate-700 flex items-center gap-2');
            codeLabel.appendChild(createIcon(icons.lock, 'w-4 h-4'));
            codeLabel.appendChild(document.createTextNode('Unique Voting Code'));
            const codeInput = createInput('text', 'Enter 8-character code', 'w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all');
            codeInput.required = true;
            codeField.appendChild(codeLabel);
            codeField.appendChild(codeInput);
            
            const submitBtn = createButton('Join Live Session', 'w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-blue-600/20 mt-4', (e) => {
                e.preventDefault();
                const result = handleLogin(studentIdInput.value, codeInput.value, isAdminTab);
                if (!result.success) {
                    errorEl.textContent = result.message;
                    errorEl.className = 'bg-red-50 text-red-700 p-3 rounded-lg text-sm border border-red-100';
                }
            });
            submitBtn.type = 'submit';
            
            form.appendChild(errorEl);
            form.appendChild(idField);
            form.appendChild(codeField);
            form.appendChild(submitBtn);
            
            formContainer.appendChild(header);
            formContainer.appendChild(form);
            
            card.appendChild(tabs);
            card.appendChild(formContainer);
            
            // Demo credentials
            const demo = createElement('div', 'mt-6 bg-slate-200/50 p-4 rounded-xl text-xs text-slate-600 border border-slate-200');
            demo.innerHTML = `
                <p class="font-bold mb-2 uppercase tracking-wider text-[10px] text-slate-400">Demo Credentials</p>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <strong class="text-slate-800">Voters:</strong><br/>
                        ID: <code class="bg-white px-1 py-0.5 rounded shadow-sm border border-slate-200">1234567</code> Code: <code class="bg-white px-1 py-0.5 rounded shadow-sm border border-slate-200">UOB2024A</code><br/>
                        ID: <code class="bg-white px-1 py-0.5 rounded shadow-sm border border-slate-200">7654321</code> Code: <code class="bg-white px-1 py-0.5 rounded shadow-sm border border-slate-200">UOB2024B</code><br/>
                        ID: <code class="bg-white px-1 py-0.5 rounded shadow-sm border border-slate-200">2345678</code> Code: <code class="bg-white px-1 py-0.5 rounded shadow-sm border border-slate-200">UOB2024C</code>
                    </div>
                    <div>
                        <strong class="text-slate-800">Admin:</strong><br/>
                        User: <code class="bg-white px-1 py-0.5 rounded shadow-sm border border-slate-200">admin</code><br/>
                        Pass: <code class="bg-white px-1 py-0.5 rounded shadow-sm border border-slate-200">admin</code><br/>
                        <br/>
                        <small class="text-slate-500">Select a position first, then click "Open Ballot"</small>
                    </div>
                </div>
            `;
            
            container.appendChild(card);
            container.appendChild(demo);
            
            return container;
        }

        function renderVoterDashboard() {
            const { activePosition, status, revealedPositions } = appState.election;
            const voterData = appState.votersDB[appState.currentUser.id];
            const hasVotedForActive = activePosition ? voterData.votedPositions.includes(activePosition) : false;
            
            const container = createElement('div', 'grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1 h-full');
            
            // Left column - voting area
            const leftCol = createElement('div', 'lg:col-span-2 flex flex-col gap-6');
            const votingCard = createElement('div', 'bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col');
            
            // Status header
            const statusHeader = createElement('div', 'flex items-center gap-2 mb-6 pb-4 border-b border-slate-100');
            const statusIndicator = createElement('span', 'relative flex h-3 w-3');
            const pingDot = createElement('span', `animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${status === 'open' ? 'bg-green-400' : 'bg-amber-400'}`);
            const staticDot = createElement('span', `relative inline-flex rounded-full h-3 w-3 ${status === 'open' ? 'bg-green-500' : 'bg-amber-500'}`);
            statusIndicator.appendChild(pingDot);
            statusIndicator.appendChild(staticDot);
            statusHeader.appendChild(statusIndicator);
            statusHeader.appendChild(createElement('h2', 'text-lg font-bold text-slate-800 uppercase tracking-wide', 'Live Ballot Status'));
            
            votingCard.appendChild(statusHeader);
            
            // Content based on state
            if (status === 'idle' || !activePosition) {
                const waitingContent = createElement('div', 'flex-1 flex flex-col items-center justify-center text-center py-12');
                waitingContent.appendChild(createIcon(icons.clock, 'w-16 h-16 text-slate-300 mb-4'));
                waitingContent.appendChild(createElement('h3', 'text-2xl font-bold text-slate-800 mb-2', 'Waiting for next ballot...'));
                waitingContent.appendChild(createElement('p', 'text-slate-500 max-w-md', 'The Returning Officer has not opened the next round of voting yet. Please keep this screen open.'));
                votingCard.appendChild(waitingContent);
            } else if (status === 'open' && !hasVotedForActive) {
                // Voting interface
                const votingContent = createElement('div', 'flex-1');
                votingContent.appendChild(createElement('h3', 'text-3xl font-bold text-slate-900 mb-2', activePosition));
                votingContent.appendChild(createElement('p', 'text-slate-500 mb-6 pb-6 border-b border-slate-100', 'Select one candidate. Your vote is anonymous and final once submitted.'));
                
                const candidatesForPosition = appState.candidates.filter(c => c.roles.includes(activePosition));
                let selectedCandidate = null;
                
                const candidatesList = createElement('div', 'space-y-3');
                
                candidatesForPosition.forEach(candidate => {
                    const label = createElement('label', 'flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all border-slate-200 hover:border-blue-300 hover:bg-slate-50');
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'ballot';
                    radio.value = candidate.fullName;
                    radio.className = 'w-5 h-5 text-blue-600 border-slate-300 focus:ring-blue-500';
                    radio.addEventListener('change', () => {
                        selectedCandidate = candidate.fullName;
                        updateSelection();
                    });
                    
                    const info = createElement('div', 'ml-4 flex flex-col');
                    info.appendChild(createElement('span', 'font-bold text-slate-800 text-lg', candidate.fullName));
                    info.appendChild(createElement('span', 'text-sm text-slate-500', `Attending: ${candidate.attending}`));
                    
                    label.appendChild(radio);
                    label.appendChild(info);
                    candidatesList.appendChild(label);
                });
                
                // RON and Abstain options
                const otherOptions = createElement('div', 'grid grid-cols-2 gap-3 mt-6');
                ['Re-Open Nominations (RON)', 'Abstain'].forEach(opt => {
                    const label = createElement('label', 'flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all border-slate-200 hover:bg-slate-50');
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'ballot';
                    radio.value = opt;
                    radio.className = 'w-5 h-5 text-slate-600 focus:ring-slate-500';
                    radio.addEventListener('change', () => {
                        selectedCandidate = opt;
                        updateSelection();
                    });
                    
                    label.appendChild(radio);
                    label.appendChild(createElement('span', 'ml-3 font-semibold text-slate-700', opt));
                    otherOptions.appendChild(label);
                });
                
                const voteBtn = createButton('Cast Vote', 'w-full mt-8 py-4 rounded-xl font-bold text-lg transition-all bg-slate-200 text-slate-400 cursor-not-allowed', () => {
                    if (selectedCandidate) {
                        handleCastVote(activePosition, selectedCandidate);
                    }
                });
                voteBtn.disabled = true;
                
                function updateSelection() {
                    if (selectedCandidate) {
                        voteBtn.className = 'w-full mt-8 py-4 rounded-xl font-bold text-lg transition-all bg-blue-600 hover:bg-blue-700 text-white shadow-lg shadow-blue-600/30';
                        voteBtn.disabled = false;
                    }
                }
                
                votingContent.appendChild(candidatesList);
                votingContent.appendChild(otherOptions);
                votingContent.appendChild(voteBtn);
                votingCard.appendChild(votingContent);
            } else if (status === 'open' && hasVotedForActive) {
                // Vote recorded state
                const recordedContent = createElement('div', 'flex-1 flex flex-col items-center justify-center text-center py-12');
                const checkIcon = createElement('div', 'w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6');
                checkIcon.appendChild(createIcon(icons.checkCircle, 'w-10 h-10 text-green-600'));
                recordedContent.appendChild(checkIcon);
                recordedContent.appendChild(createElement('h3', 'text-2xl font-bold text-slate-900 mb-2', 'Vote Recorded'));
                const message = createElement('p', 'text-slate-500 max-w-md');
                message.innerHTML = `Your vote for <strong>${activePosition}</strong> has been securely cast. Please wait for the admin to close the ballot.`;
                recordedContent.appendChild(message);
                votingCard.appendChild(recordedContent);
            } else if (status === 'closed') {
                // Voting closed state
                const closedContent = createElement('div', 'flex-1 flex flex-col items-center justify-center text-center py-12');
                closedContent.appendChild(createIcon(icons.lock, 'w-16 h-16 text-slate-400 mb-4'));
                closedContent.appendChild(createElement('h3', 'text-2xl font-bold text-slate-800 mb-2', 'Voting Closed'));
                const message = createElement('p', 'text-slate-500 max-w-md');
                message.innerHTML = `Voting for <strong>${activePosition}</strong> has concluded. Awaiting the Returning Officer to reveal the results.`;
                closedContent.appendChild(message);
                votingCard.appendChild(closedContent);
            }
            
            leftCol.appendChild(votingCard);
            
            // Right column - results
            const rightCol = createElement('div', 'bg-slate-900 text-white rounded-2xl shadow-xl flex flex-col overflow-hidden');
            const resultsHeader = createElement('div', 'p-6 border-b border-slate-800 bg-slate-800/50 flex items-center gap-3');
            resultsHeader.appendChild(createIcon(icons.trophy, 'w-6 h-6 text-yellow-400'));
            resultsHeader.appendChild(createElement('h2', 'text-xl font-bold', 'Announced Results'));
            
            const resultsContent = createElement('div', 'p-6 flex-1 overflow-y-auto bg-slate-900');
            if (revealedPositions.length === 0) {
                resultsContent.appendChild(createElement('div', 'text-center text-slate-500 py-10 italic', 'No results have been announced yet.'));
            } else {
                const resultsList = createElement('div', 'space-y-6');
                [...revealedPositions].reverse().forEach(pos => {
                    const posResults = appState.results[pos] || {};
                    const sorted = Object.entries(posResults).sort((a, b) => b[1] - a[1]);
                    const winner = sorted.length > 0 ? sorted[0][0] : "No votes";
                    
                    const resultCard = createElement('div', 'bg-slate-800 rounded-xl p-4 border border-slate-700 shadow-inner');
                    resultCard.appendChild(createElement('h4', 'text-xs font-bold text-slate-400 uppercase tracking-wider mb-2', pos));
                    const winnerEl = createElement('p', 'text-lg font-bold text-white flex items-center justify-between', winner);
                    if (winner !== "No votes" && winner !== "Re-Open Nominations (RON)") {
                        winnerEl.appendChild(createIcon(icons.checkCircle, 'w-5 h-5 text-green-400'));
                    }
                    resultCard.appendChild(winnerEl);
                    resultsList.appendChild(resultCard);
                });
                resultsContent.appendChild(resultsList);
            }
            
            rightCol.appendChild(resultsHeader);
            rightCol.appendChild(resultsContent);
            
            container.appendChild(leftCol);
            container.appendChild(rightCol);
            
            return container;
        }

        function renderAdminDashboard() {
            const { activePosition, status, revealedPositions } = appState.election;
            const totalEligible = Object.keys(appState.votersDB).length;
            const currentVotesCount = activePosition ? 
                Object.values(appState.votersDB).filter(v => v.votedPositions.includes(activePosition)).length : 0;
            
            const container = createElement('div', 'flex flex-col flex-1 h-full gap-6');
            
            // Header
            const header = createElement('div', 'bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex flex-col sm:flex-row justify-between items-center gap-4');
            const title = createElement('h2', 'text-xl font-bold text-slate-800 flex items-center gap-2');
            title.appendChild(createIcon(icons.shield, 'w-6 h-6 text-indigo-600'));
            title.appendChild(document.createTextNode('Returning Officer Panel'));
            header.appendChild(title);
            
            const mainGrid = createElement('div', 'grid grid-cols-1 lg:grid-cols-3 gap-6');
            
            // Main controls
            const controlsCard = createElement('div', 'lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8');
            controlsCard.appendChild(createElement('h3', 'text-lg font-bold text-slate-800 mb-6 border-b border-slate-100 pb-4', 'Election Controller'));
            
            const controlsContent = createElement('div', 'space-y-8');
            
            // Position selector
            const selectorDiv = createElement('div', status !== 'idle' ? 'opacity-50 pointer-events-none' : '');
            selectorDiv.appendChild(createElement('label', 'block text-sm font-bold text-slate-700 mb-2', '1. Select Position to Elect'));
            
            const select = document.createElement('select');
            select.className = 'w-full p-4 border border-slate-300 rounded-xl font-bold text-slate-800 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none';
            select.value = activePosition || '';
            
            const defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.disabled = true;
            defaultOption.textContent = '-- Select a role --';
            select.appendChild(defaultOption);
            
            POSITIONS.forEach(pos => {
                const option = document.createElement('option');
                option.value = pos;
                const isRevealed = revealedPositions.includes(pos);
                option.disabled = isRevealed;
                option.textContent = `${pos} ${isRevealed ? '(Completed)' : ''}`;
                select.appendChild(option);
            });
            
            select.addEventListener('change', (e) => {
                appState.election.activePosition = e.target.value;
                render();
            });
            
            selectorDiv.appendChild(select);
            
            // Action buttons
            const buttonsGrid = createElement('div', 'grid grid-cols-1 md:grid-cols-3 gap-4');
            
            const openBtn = createButton('Open Ballot', 
                `flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all ${status === 'idle' && appState.election.activePosition ? 'border-green-500 bg-green-50 text-green-700 hover:bg-green-100 cursor-pointer shadow-sm' : 'border-slate-200 bg-slate-50 text-slate-400 cursor-not-allowed'}`,
                () => {
                    if (appState.election.activePosition && status === 'idle') {
                        handleOpenVoting(appState.election.activePosition);
                    }
                }
            );
            openBtn.appendChild(createIcon(icons.play, 'w-8 h-8 mb-2'));
            openBtn.appendChild(createElement('span', 'font-bold', 'Open Ballot'));
            
            const closeBtn = createButton('Close Ballot',
                `flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all ${status === 'open' ? 'border-amber-500 bg-amber-50 text-amber-700 hover:bg-amber-100 cursor-pointer shadow-sm' : 'border-slate-200 bg-slate-50 text-slate-400 cursor-not-allowed'}`,
                () => {
                    if (status === 'open') {
                        handleCloseVoting();
                    }
                }
            );
            closeBtn.appendChild(createIcon(icons.square, 'w-8 h-8 mb-2'));
            closeBtn.appendChild(createElement('span', 'font-bold', 'Close Ballot'));
            
            const revealBtn = createButton('Reveal & Reset',
                `flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all ${status === 'closed' ? 'border-blue-500 bg-blue-50 text-blue-700 hover:bg-blue-100 cursor-pointer shadow-sm' : 'border-slate-200 bg-slate-50 text-slate-400 cursor-not-allowed'}`,
                () => {
                    if (status === 'closed') {
                        handleRevealResults();
                    }
                }
            );
            revealBtn.appendChild(createIcon(icons.eye, 'w-8 h-8 mb-2'));
            revealBtn.appendChild(createElement('span', 'font-bold', 'Reveal & Reset'));
            
            buttonsGrid.appendChild(openBtn);
            buttonsGrid.appendChild(closeBtn);
            buttonsGrid.appendChild(revealBtn);
            
            controlsContent.appendChild(selectorDiv);
            controlsContent.appendChild(buttonsGrid);
            controlsCard.appendChild(controlsContent);
            
            // Stats panel
            const statsCard = createElement('div', 'bg-slate-900 rounded-2xl shadow-sm text-white p-6 flex flex-col');
            const statsHeader = createElement('h3', 'text-lg font-bold mb-6 flex items-center gap-2 text-indigo-300');
            statsHeader.appendChild(createIcon(icons.barChart, 'w-5 h-5'));
            statsHeader.appendChild(document.createTextNode('Live Monitor'));
            statsCard.appendChild(statsHeader);
            
            // Current ballot info
            const currentBallot = createElement('div', 'bg-slate-800 rounded-xl p-4 mb-4 border border-slate-700');
            currentBallot.appendChild(createElement('p', 'text-sm text-slate-400 mb-1', 'Current Ballot'));
            currentBallot.appendChild(createElement('p', 'text-xl font-bold text-white', activePosition || 'None Active'));
            
            const statusBadge = createElement('div', 'mt-2 inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-bold uppercase tracking-wider bg-slate-900 border border-slate-600');
            const statusDot = createElement('div', `w-2 h-2 rounded-full ${status === 'open' ? 'bg-green-500' : status === 'closed' ? 'bg-amber-500' : 'bg-slate-500'}`);
            statusBadge.appendChild(statusDot);
            statusBadge.appendChild(document.createTextNode(status));
            currentBallot.appendChild(statusBadge);
            statsCard.appendChild(currentBallot);
            
            // Turnout info (if voting is open)
            if (status === 'open') {
                const turnout = createElement('div', 'bg-slate-800 rounded-xl p-4 border border-slate-700 mb-4');
                turnout.appendChild(createElement('p', 'text-sm text-slate-400 mb-2', 'Turnout (This Ballot)'));
                
                const turnoutNumbers = createElement('div', 'flex items-end gap-2 mb-2');
                turnoutNumbers.appendChild(createElement('span', 'text-4xl font-bold text-white', currentVotesCount.toString()));
                turnoutNumbers.appendChild(createElement('span', 'text-slate-400 mb-1', `/ ${totalEligible} voters`));
                turnout.appendChild(turnoutNumbers);
                
                const progressBar = createElement('div', 'w-full bg-slate-900 rounded-full h-2.5');
                const progress = createElement('div', 'bg-indigo-500 h-2.5 rounded-full transition-all duration-500');
                progress.style.width = `${(currentVotesCount / totalEligible) * 100}%`;
                progressBar.appendChild(progress);
                turnout.appendChild(progressBar);
                
                statsCard.appendChild(turnout);
            }
            
            // Results preview (if closed)
            if (status === 'closed' && activePosition) {
                const resultsPreview = createElement('div', 'bg-slate-800 rounded-xl p-4 border border-slate-700 flex-1');
                resultsPreview.appendChild(createElement('p', 'text-sm text-slate-400 mb-4 border-b border-slate-700 pb-2', 'Preliminary Results (Hidden from Voters)'));
                
                const resultsList = createElement('ul', 'space-y-3');
                const posResults = appState.results[activePosition] || {};
                Object.entries(posResults)
                    .sort((a, b) => b[1] - a[1])
                    .forEach(([name, count]) => {
                        const item = createElement('li', 'flex justify-between items-center bg-slate-900 p-2 rounded-lg');
                        item.appendChild(createElement('span', 'text-sm truncate pr-2', name));
                        item.appendChild(createElement('span', 'font-mono font-bold text-indigo-300', count.toString()));
                        resultsList.appendChild(item);
                    });
                
                resultsPreview.appendChild(resultsList);
                statsCard.appendChild(resultsPreview);
            }
            
            mainGrid.appendChild(controlsCard);
            mainGrid.appendChild(statsCard);
            
            container.appendChild(header);
            container.appendChild(mainGrid);
            
            return container;
        }

        function render() {
            const root = document.getElementById('root');
            root.innerHTML = '';
            
            // Header
            const header = createElement('header', 'bg-slate-900 text-white p-4 shadow-md flex justify-between items-center z-10');
            const headerContent = createElement('div', 'flex items-center gap-3 max-w-5xl mx-auto w-full');
            
            headerContent.appendChild(createIcon(icons.shield, 'w-8 h-8 text-blue-400'));
            
            const headerText = createElement('div', 'flex-1');
            headerText.appendChild(createElement('h1', 'text-xl font-bold tracking-tight', 'UoB Debate Society'));
            headerText.appendChild(createElement('p', 'text-xs text-slate-400 uppercase tracking-wider font-semibold', 'Live Election System'));
            headerContent.appendChild(headerText);
            
            if (appState.currentUser) {
                const userInfo = createElement('div', 'flex items-center gap-4');
                const userText = createElement('span', 'hidden sm:inline-block text-sm text-slate-300');
                userText.innerHTML = `Logged in as: <span class="font-mono font-bold text-white">${appState.currentUser.id}</span>`;
                userInfo.appendChild(userText);
                
                const logoutBtn = createButton('Logout', 'text-slate-300 hover:text-white flex items-center gap-1 text-sm bg-slate-800 px-3 py-1.5 rounded-lg transition-colors', handleLogout);
                logoutBtn.appendChild(createIcon(icons.logOut, 'w-4 h-4'));
                logoutBtn.appendChild(createElement('span', 'hidden sm:inline-block', 'Logout'));
                userInfo.appendChild(logoutBtn);
                
                headerContent.appendChild(userInfo);
            }
            
            header.appendChild(headerContent);
            
            // Main content
            const main = createElement('main', 'flex-1 w-full max-w-5xl mx-auto p-4 md:p-6 flex flex-col');
            
            if (appState.view === 'login') {
                main.appendChild(renderLoginView());
            } else if (appState.view === 'voter') {
                main.appendChild(renderVoterDashboard());
            } else if (appState.view === 'admin') {
                main.appendChild(renderAdminDashboard());
            }
            
            const container = createElement('div', 'min-h-screen bg-slate-100 text-slate-900 font-sans selection:bg-blue-200 flex flex-col');
            container.appendChild(header);
            container.appendChild(main);
            
            root.appendChild(container);
        }

        // Initialize the app
        render();
    </script>
</body>
</html>
